<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Future Reformers High School hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f7fb;
}

/* SECTIONS */

section{
padding:70px 8%;
}

.title{
text-align:center;
margin-bottom:40px;
}

.title h2{
font-size:32px;
color:#0a3d62;
}
/* COURSES */

.courses{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.course{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.course i{
font-size:35px;
color:#1e90ff;
margin-bottom:10px;
}
</style>

</head>

<body>

<section>

<div class="title">
<h2 id="class">Our Classes</h2>
</div>

<div class="courses">

<div class="course">
<i class="fa fa-book"></i>
<h3>Primary Classes</h3>
<p>Strong educational foundation for young learners.</p>
</div>

<div class="course">
<i class="fa fa-laptop"></i>
<h3>Computer Education</h3>
<p>Modern computer and digital learning programs.</p>
</div>

<div class="course">
<i class="fa fa-flask"></i>
<h3>Science</h3>
<p>Interactive science education and practical learning.</p>
</div>

<div class="course">
<i class="fa fa-language"></i>
<h3>Languages</h3>
<p>English, Urdu and communication development.</p>
</div>

</div>

</section>

</body>
</html>
