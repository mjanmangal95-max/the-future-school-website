<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admission form</title>
    <style>
        body{
            margin: 0;
            padding: 0;
        }
        form{
            width: 100%;
            max-width: 500px;
            height: auto;
            background-color: darkblue;
            border: 3px solid black;
            margin: auto;
        }
        form h1{
            text-transform: uppercase;
            text-align: center;
            color: white;
        }
       form input{
            width: 100%;
            max-width: 300px;
            text-align: center;
            height: 40px;
            border-radius: 20px;
            margin: 20px;
            margin-left: 80px;
        }
        .button{
            background-color: green;
            color: white;
            text-transform: uppercase;
            border: 3px solid white;
        }

    </style>
</head>
<body>
    <form action="">
        <h1>admission form</h1>
        <input type="text" name="username" id="uname" placeholder="Your Name"><br><br>

        <input type="text" name="fathername" id="fname" placeholder="Your Father Name"><br><br>

        <input type="number" name="fnic" id="nic" placeholder="Your Father NIC number"> <br><br>

        <input type="number" name="bform" id="bfornum" placeholder="Your Bform/NIC number"> <br><br>

        <input type="date" name="date" id="dob">  <br><br>

        <input type="text" name="address" id="address" placeholder="Your Address"> <br><br>

        <input class="button" type="Submit" value="submit">

        
    </form>

</body>
</html>
